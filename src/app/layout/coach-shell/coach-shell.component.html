<div class="flex h-screen bg-background overflow-hidden">

  <!-- Sidebar -->
  <aside class="hidden md:flex w-64 h-screen fixed left-0 border-r border-outline-variant/10 bg-background flex-col py-8 z-40">
    <!-- Brand -->
    <div class="px-6 mb-8">
      <h1 class="text-xl font-bold text-on-surface font-headline">Coach Premium</h1>
      <p class="text-[10px] text-primary-fixed tracking-widest uppercase font-headline mt-0.5">Nível Elite</p>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-4 space-y-1">
      @for (item of navItems; track item.route) {
        <a [routerLink]="item.route"
           routerLinkActive="bg-surface-container-high text-primary-fixed font-bold rounded-r-full"
           [routerLinkActiveOptions]="{ exact: false }"
           class="flex items-center gap-3 px-4 py-3 text-outline hover:bg-surface-container/50 hover:text-on-surface transition-all duration-200 font-headline">
          <span class="material-symbols-outlined text-[22px]">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <!-- Novo Treino CTA -->
    <div class="px-6 pt-6">
      <button type="button"
              class="w-full bg-primary-fixed hover:bg-primary-dim text-on-primary-fixed font-headline font-black py-4 rounded-md uppercase tracking-tighter transition-all flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-[20px]">add</span>
        Novo Treino
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 md:ml-64 flex flex-col overflow-hidden">
    <router-outlet />
  </main>

</div>
