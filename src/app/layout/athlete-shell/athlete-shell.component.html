<div class="flex flex-col min-h-screen bg-background overflow-hidden max-w-md mx-auto relative">

  <!-- Top bar -->
  <header class="top-bar fixed top-0 left-0 right-0 max-w-md mx-auto z-50 flex items-center justify-between px-6 py-4">
    <h1 class="font-headline font-black text-xl tracking-tighter text-primary-fixed italic uppercase">AevonFit</h1>
    <div class="flex items-center gap-4">
      <button type="button" class="text-on-surface-variant hover:text-primary-fixed transition-colors">
        <span class="material-symbols-outlined text-[22px]">notifications</span>
      </button>
      <button type="button" class="text-on-surface-variant hover:text-primary-fixed transition-colors">
        <span class="material-symbols-outlined text-[22px]">settings</span>
      </button>
      <div class="w-8 h-8 rounded-full bg-primary-fixed/20 border border-primary-fixed/30 flex items-center justify-center text-xs font-bold text-primary-fixed font-headline">
        {{ auth.currentUser()?.name?.charAt(0) ?? 'A' }}
      </div>
    </div>
  </header>

  <!-- Content -->
  <main class="flex-1 pt-16 pb-24 overflow-y-auto">
    <router-outlet />
  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav fixed bottom-0 left-0 right-0 max-w-md mx-auto z-50 flex justify-around items-center px-6 pt-4 pb-8
              rounded-t-3xl shadow-[0_-10px_20px_rgba(0,0,0,0.5)]">
    <a routerLink="/athlete/home" routerLinkActive="text-primary-fixed scale-110" [routerLinkActiveOptions]="{exact:true}"
       class="flex flex-col items-center gap-1 text-outline transition-all">
      <span class="material-symbols-outlined text-[24px]">exercise</span>
      <span class="font-headline text-[10px] uppercase font-bold">Treino</span>
    </a>
    <a routerLink="/athlete/weekly" routerLinkActive="text-primary-fixed scale-110"
       class="flex flex-col items-center gap-1 text-outline transition-all">
      <span class="material-symbols-outlined text-[24px]">insights</span>
      <span class="font-headline text-[10px] uppercase font-bold">Evolução</span>
    </a>
    <a routerLink="/athlete/home" routerLinkActive=""
       class="flex flex-col items-center gap-1 text-outline active:scale-95 transition-all">
      <span class="material-symbols-outlined text-[24px]">chat</span>
      <span class="font-headline text-[10px] uppercase font-bold">Mensagens</span>
    </a>
    <a routerLink="/athlete/history" routerLinkActive="text-primary-fixed scale-110"
       class="flex flex-col items-center gap-1 text-outline active:scale-95 transition-all">
      <span class="material-symbols-outlined text-[24px]">person</span>
      <span class="font-headline text-[10px] uppercase font-bold">Perfil</span>
    </a>
  </nav>

</div>
